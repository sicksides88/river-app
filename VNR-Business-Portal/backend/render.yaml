services:
  - type: web
    name: vnr-backend
    runtime: node
    plan: free
    rootDir: VNR-Business-Portal/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: API_URL
        value: https://river-backend-idio.onrender.com